name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + typecheck + test + build (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        node: ["22.12.0"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Show toolchain
        shell: bash
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test: `genmem --version`
        run: node bin/genmem-mcp.js --version

      - name: Smoke test: `genmem doctor` on a fresh scope
        shell: bash
        run: |
          set -e
          TMP=$(mktemp -d)
          node bin/genmem-mcp.js init --scope "$TMP"
          node bin/genmem-mcp.js doctor --scope "$TMP"
